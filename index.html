<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Doomscroll GRE</title>
  
  <!-- PWA Manifest & Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              200: '#99f6e4',
              300: '#5eead4',
              400: '#2dd4bf',
              500: '#14b8a6',
              600: '#0d9488',
              700: '#0f766e',
              800: '#115e59',
              900: '#134e4a',
            }
          },
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
            serif: ['Lora', 'Georgia', 'serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="index.css">
</head>
<body class="bg-black text-white antialiased overflow-hidden select-none w-screen h-screen">

  <!-- Main Dashboard Screen (Starts completely empty) -->
  <div id="main-screen" class="fixed inset-0 bg-neutral-950 transition-all duration-300 z-20"></div>
  <!-- Search Screen (Starts completely empty) -->
  <div id="search-screen" class="fixed inset-0 bg-neutral-950 transition-all duration-300 z-20 hidden"></div>

  <!-- Main Swipe Container -->
  <main id="reels-feed" class="w-full h-full overflow-y-scroll scroll-snap-y mandatory scrollbar-none relative hidden">
    <!-- Populated dynamically by index.js -->
  </main>

  <!-- Sliding Comments Drawer (Instagram Style) -->
  <div id="comments-drawer" class="fixed inset-x-0 bottom-0 h-[45%] bg-white dark:bg-neutral-900 border-t border-slate-100 dark:border-neutral-800/80 rounded-t-2xl z-40 transform translate-y-full transition-transform duration-300 ease-out flex flex-col shadow-2xl overflow-hidden">
    <!-- Drawer Handle / Drag Zone -->
    <div id="comments-drag-handle" class="w-full pt-3 pb-1 flex justify-center cursor-grab active:cursor-grabbing shrink-0">
      <div class="w-10 h-1.5 bg-slate-300 dark:bg-neutral-700 rounded-full"></div>
    </div>
    
    <!-- Drawer Content Scroll Area -->
    <div id="comments-content-list" class="flex-grow overflow-y-auto px-5 py-3 space-y-4">
      <!-- Generated dynamically in index.js -->
    </div>

    <!-- Instagram Persistent Bottom Comment Bar -->
    <div class="p-3 border-t border-slate-100 dark:border-neutral-900/60 bg-white dark:bg-neutral-900 flex items-center gap-3 shrink-0 select-none">
      <svg class="w-8 h-8 rounded-full bg-slate-300 dark:bg-neutral-700 text-slate-100 dark:text-neutral-500 overflow-hidden select-none shrink-0" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="8.5" r="4.25"></circle>
        <path d="M12 14c-5.2 0-9.5 3-9.5 7.5v.5h19v-.5c0-4.5-4.3-7.5-9.5-7.5z"></path>
      </svg>
      <div class="flex-grow relative flex items-center">
        <input type="text" placeholder="Add a comment..." class="w-full bg-slate-50 dark:bg-neutral-800 border border-slate-200 dark:border-neutral-800 rounded-full py-1.5 pl-4 pr-12 text-xs text-slate-850 dark:text-slate-100 placeholder-slate-400 focus:outline-none" readonly onclick="showToast('Custom notes coming soon!', 'info')">
        <button class="absolute right-4 text-xs font-bold text-teal-600 hover:text-teal-700 focus:outline-none" onclick="showToast('Custom notes coming soon!', 'info')">Post</button>
      </div>
    </div>
  </div>

  <!-- Glassmorphism Bottom Navigation Bar -->
  <nav id="bottom-navbar" class="fixed bottom-0 inset-x-0 h-16 bg-black/60 backdrop-blur-lg border-t border-white/10 z-30 transition-transform duration-300 ease-out flex items-center justify-around px-4 pb-safe">
    <!-- Sliding Active Bubble -->
    <div id="navbar-bubble" class="absolute h-12 bg-white/10 border border-white/20 rounded-full shadow-lg pointer-events-none z-0"></div>

    <!-- Home Menu (Starts active - text color and zoom set dynamically via JS) -->
    <div id="nav-btn-home" onclick="onNavClick('home')" class="w-12 h-12 flex items-center justify-center transition-all duration-200 text-white cursor-pointer z-10">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
      </svg>
    </div>
    
    <!-- Search -->
    <div id="nav-btn-search" onclick="onNavClick('search')" class="w-12 h-12 flex items-center justify-center text-white/50 hover:text-white transition-all duration-200 cursor-pointer z-10">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
      </svg>
    </div>

    <!-- Reels -->
    <div id="nav-btn-reels" onclick="onNavClick('reels')" class="w-12 h-12 flex items-center justify-center text-white/50 hover:text-white transition-all duration-200 cursor-pointer z-10">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
      </svg>
    </div>

    <!-- Send (Disabled / unselectable) -->
    <div id="nav-btn-send" class="w-12 h-12 flex items-center justify-center text-white/20 select-none pointer-events-none z-10">
      <svg class="w-6 h-6 rotate-45" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
      </svg>
    </div>

    <!-- Profile (Disabled / unselectable) -->
    <div id="nav-btn-profile" class="w-12 h-12 flex items-center justify-center text-white/20 select-none pointer-events-none z-10">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
      </svg>
    </div>
  </nav>

  <!-- Database & Logic Scripts -->
  <script src="database.js"></script>
  <script src="index.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registered.', reg.scope))
          .catch(err => console.log('Service Worker registration failed: ', err));
      });
    }
  </script>
</body>
</html>
