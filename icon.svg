<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Turquoise Gradient -->
    <linearGradient id="turqGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="25%" stop-color="#5eead4"/>
      <stop offset="55%" stop-color="#2dd4bf"/>
      <stop offset="80%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>

    <!-- White Glow Highlight -->
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ccfbf1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Black Shadow Ribbon -->
    <linearGradient id="darkRibbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#18181b" stop-opacity="0.75"/>
    </linearGradient>

    <!-- Glow Effect Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="eyeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Pitch Black Container Background -->
  <rect width="512" height="512" rx="112" fill="#000000"/>
  
  <!-- Subtle Center Radial Glow -->
  <circle cx="256" cy="256" r="160" fill="#14b8a6" opacity="0.15" filter="url(#glow)"/>

  <!-- 1. Single Homogeneous Circular Spiral Ribbon (Zero internal light blue lines or details) -->
  <g filter="url(#glow)">
    <!-- Dark Shadow Ribbon Underlay -->
    <path d="M 431 155 
             A 202 202 0 0 0 54 256 
             A 202 202 0 0 0 256 458 
             A 202 202 0 0 0 458 256 
             A 177 177 0 0 0 256 80 
             A 152 152 0 0 0 104 256 
             A 152 152 0 0 0 256 408 
             A 115 115 0 0 0 352 256" 
          fill="none" stroke="url(#darkRibbon)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 5)"/>

    <!-- Main Turquoise Circular Ribbon (100% Homogeneous Solid Fill) -->
    <path d="M 431 155 
             A 202 202 0 0 0 54 256 
             A 202 202 0 0 0 256 458 
             A 202 202 0 0 0 458 256 
             A 177 177 0 0 0 256 80 
             A 152 152 0 0 0 104 256 
             A 152 152 0 0 0 256 408 
             A 115 115 0 0 0 352 256" 
          fill="none" stroke="url(#turqGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- White Glint Highlight line (Outer Arc only) -->
    <path d="M 431 155 A 202 202 0 0 0 54 256 A 202 202 0 0 0 256 458" 
          fill="none" stroke="url(#whiteGrad)" stroke-width="5" stroke-linecap="round" transform="translate(-2, -2)"/>
  </g>

  <!-- 2. Clean Eye Center Motif (Unchanged) -->
  <g filter="url(#eyeGlow)">
    <!-- Outer Eye Outline (Almond / Lens Shape) -->
    <path d="M 160 256 Q 256 160 352 256 Q 256 352 160 256 Z" fill="#000000" stroke="url(#turqGrad)" stroke-width="7" stroke-linejoin="round" />
    
    <!-- Eye Inner Eyeline Accent -->
    <path d="M 172 256 Q 256 172 340 256 Q 256 340 172 256 Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6" />

    <!-- Iris Circle -->
    <circle cx="256" cy="256" r="44" fill="#041014" stroke="url(#turqGrad)" stroke-width="4" />

    <!-- Pupil Inner Core Ring -->
    <circle cx="256" cy="256" r="20" fill="#092d2a" stroke="#5eead4" stroke-width="2.5"/>

    <!-- Eye Catchlight / Glint Dots -->
    <circle cx="242" cy="242" r="5" fill="#ffffff" />
    <circle cx="270" cy="270" r="2.5" fill="#ffffff" opacity="0.7" />
  </g>
</svg>